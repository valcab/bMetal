<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Black Metal Typography</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ash: "#f5f2ef",
              fog: "#d8d0c6",
              mist: "#aaa1a6",
              blood: "#8d1723",
              ember: "#a11d2d",
              cinder: "#5d0e17",
              panel: "#161218",
              panelSoft: "#1b161d"
            },
            fontFamily: {
              display: ["Georgia", "\"Times New Roman\"", "serif"]
            },
            boxShadow: {
              blood: "0 0 0 1px rgba(255,255,255,0.08), inset 0 1px 0 rgba(255,255,255,0.03)"
            }
          }
        }
      };
    </script>
    <style>
      :root {
        color-scheme: dark;
      }

      input[type="range"] {
        width: 100%;
        accent-color: #b2313c;
      }
    </style>
  </head>
  <body class="m-0 min-h-screen bg-[radial-gradient(circle_at_top,rgba(141,23,35,0.24),transparent_32%),linear-gradient(180deg,#09090a_0%,#120f13_60%,#0d0d0f_100%)] font-display text-[12px] leading-[1.4] text-ash">
    <div class="p-4">
      <div class="mb-4 border border-white/10 bg-[linear-gradient(135deg,rgba(255,255,255,0.05),transparent_55%),linear-gradient(180deg,rgba(141,23,35,0.18),rgba(0,0,0,0.22))] p-3.5 shadow-blood">
        <h1 class="m-0 text-[20px] font-bold uppercase tracking-[0.08em]">Black Metal Typography</h1>
        <div class="mt-1.5 text-mist">Editable text with dense white ink mass, cathedral spires, mirrored roots, and atmospheric detail.</div>
        <div class="mt-2 min-h-[34px] border-l-2 border-blood bg-white/5 px-2.5 py-2 text-fog" id="status">Select a text layer to begin.</div>
      </div>

      <div class="mb-4 grid grid-cols-3 gap-2" id="presets"></div>

      <div class="grid grid-cols-2 gap-2.5" id="controls"></div>

      <div class="mt-4 grid grid-cols-2 gap-2.5">
        <button class="cursor-pointer border border-white/10 bg-panel px-3 py-2.5 text-ash transition-colors hover:bg-panelSoft" id="refresh">Refresh Selection</button>
        <button class="cursor-pointer border border-white/10 bg-[linear-gradient(180deg,#a11d2d,#5d0e17)] px-3 py-2.5 font-bold uppercase tracking-[0.08em] text-ash transition-opacity hover:opacity-95" id="apply">Create / Update</button>
      </div>

      <div class="mt-3 text-[11px] text-mist">
        The source text stays editable inside the generated frame. Edit that layer, then run the plugin again to regenerate.
      </div>
    </div>

    <script>
      const PRESETS = {
        necrotic: {
          preset: "necrotic",
          seed: 13,
          branches: 96,
          branchLength: 138,
          branchWeight: 3.5,
          chaos: 0.28,
          symmetry: 0.92,
          cloneLayers: 14,
          cloneSpread: 6,
          tracking: -10,
          verticalStretch: 1.18,
          coreWeightBoost: 0,
          halo: 0.38,
          haze: 0.24,
          frost: 0.16,
          drips: 18,
          dripLength: 68,
          padding: 90
        },
        frostbitten: {
          preset: "frostbitten",
          seed: 27,
          branches: 118,
          branchLength: 148,
          branchWeight: 3,
          chaos: 0.2,
          symmetry: 0.96,
          cloneLayers: 16,
          cloneSpread: 5,
          tracking: -6,
          verticalStretch: 1.22,
          coreWeightBoost: 0,
          halo: 0.44,
          haze: 0.28,
          frost: 0.62,
          drips: 14,
          dripLength: 56,
          padding: 98
        },
        feral: {
          preset: "feral",
          seed: 81,
          branches: 134,
          branchLength: 164,
          branchWeight: 4.2,
          chaos: 0.46,
          symmetry: 0.8,
          cloneLayers: 18,
          cloneSpread: 8,
          tracking: -14,
          verticalStretch: 1.24,
          coreWeightBoost: 2,
          halo: 0.28,
          haze: 0.14,
          frost: 0.04,
          drips: 24,
          dripLength: 82,
          padding: 108
        }
      };

      const CONTROLS = [
        ["seed", "Seed", 1, 9999, 1],
        ["branches", "Branches", 8, 160, 1],
        ["branchLength", "Branch Length", 20, 220, 1],
        ["branchWeight", "Branch Weight", 1, 18, 0.5],
        ["chaos", "Chaos", 0, 1, 0.01],
        ["symmetry", "Symmetry", 0, 1, 0.01],
        ["cloneLayers", "Clone Layers", 0, 20, 1],
        ["cloneSpread", "Clone Spread", 0, 40, 1],
        ["tracking", "Tracking", -40, 80, 1],
        ["verticalStretch", "Vertical Stretch", 0.7, 1.6, 0.01],
        ["coreWeightBoost", "Core Stroke", 0, 12, 0.5],
        ["halo", "Halo", 0, 1, 0.01],
        ["haze", "Haze", 0, 1, 0.01],
        ["frost", "Frost", 0, 1, 0.01],
        ["drips", "Drips", 0, 40, 1],
        ["dripLength", "Drip Length", 0, 120, 1]
      ];

      const state = Object.assign({}, PRESETS.necrotic);
      const controlsEl = document.getElementById("controls");
      const presetsEl = document.getElementById("presets");
      const statusEl = document.getElementById("status");
      const inputs = {};
      const presetClassName =
        "cursor-pointer border border-white/10 bg-panel px-3 py-2.5 text-ash transition-colors hover:bg-panelSoft";
      const activePresetClassName =
        "border-fog/40 bg-[linear-gradient(180deg,rgba(141,23,35,0.5),rgba(22,18,24,1))] text-fog";

      function renderPresets() {
        presetsEl.innerHTML = "";
        Object.entries(PRESETS).forEach(([key, preset]) => {
          const button = document.createElement("button");
          button.className =
            presetClassName + (state.preset === key ? " " + activePresetClassName : "");
          button.textContent = key;
          button.addEventListener("click", () => {
            Object.assign(state, preset);
            render();
          });
          presetsEl.appendChild(button);
        });
      }

      function renderControls() {
        controlsEl.innerHTML = "";
        CONTROLS.forEach(([key, label, min, max, step]) => {
          const wrap = document.createElement("div");
          wrap.className = "border border-white/10 bg-white/[0.03] p-2.5";

          const title = document.createElement("label");
          title.className =
            "mb-2 flex items-baseline justify-between gap-2.5 text-[10px] uppercase tracking-[0.08em] text-mist";
          title.innerHTML = `<span>${label}</span><output class="text-ash" id="${key}-out"></output>`;

          const input = document.createElement("input");
          input.type = "range";
          input.className = "block w-full cursor-pointer accent-[#b2313c]";
          input.min = String(min);
          input.max = String(max);
          input.step = String(step);
          input.value = String(state[key]);
          input.addEventListener("input", () => {
            state[key] = step < 1 ? Number(input.value) : Math.round(Number(input.value));
            renderOutputs();
          });

          wrap.appendChild(title);
          wrap.appendChild(input);
          controlsEl.appendChild(wrap);
          inputs[key] = input;
        });
      }

      function renderOutputs() {
        CONTROLS.forEach(([key]) => {
          const out = document.getElementById(`${key}-out`);
          const value = state[key];
          out.textContent =
            Number.isInteger(value) || Math.abs(value) >= 10 ? String(value) : value.toFixed(2);
        });
      }

      function render() {
        renderPresets();
        Object.entries(inputs).forEach(([key, input]) => {
          input.value = String(state[key]);
        });
        renderOutputs();
      }

      document.getElementById("refresh").addEventListener("click", () => {
        parent.postMessage({ pluginMessage: { type: "get-selection" } }, "*");
      });

      document.getElementById("apply").addEventListener("click", () => {
        parent.postMessage({ pluginMessage: { type: "apply", settings: state } }, "*");
      });

      window.onmessage = (event) => {
        const msg = event.data.pluginMessage;
        if (!msg) return;

        if (msg.type === "selection") {
          statusEl.textContent = msg.payload.message;
          if (msg.payload.settings) {
            Object.assign(state, msg.payload.settings);
            render();
          }
        }

        if (msg.type === "applied") {
          statusEl.textContent = msg.payload.action === "created"
            ? "Generated editable black metal typography."
            : "Updated the selected black metal typography.";
        }

        if (msg.type === "error") {
          statusEl.textContent = msg.message;
        }
      };

      renderPresets();
      renderControls();
      renderOutputs();
      parent.postMessage({ pluginMessage: { type: "get-selection" } }, "*");
    </script>
  </body>
</html>
